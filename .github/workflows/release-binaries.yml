name: release-binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "要上傳 assets 的既有 release tag（如 v1.2.0）"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel macOS hosted runner（macos-13）已退役，不再提供 Intel 版；Intel Mac 請走原始碼模式
          - os: macos-latest
            asset: cc-codex-sync-macos-arm64
          - os: windows-latest
            asset: cc-codex-sync-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build single-file binary
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name "${{ matrix.asset }}" --paths memsync memsync/cli.py
      - name: Smoke test (status against empty home)
        if: runner.os != 'Windows'
        run: ./dist/${{ matrix.asset }} status
      - name: Smoke test (status against empty home, Windows)
        if: runner.os == 'Windows'
        run: ./dist/${{ matrix.asset }} status
        shell: pwsh
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.inputs.tag || github.ref_name }}" "dist/${{ matrix.asset }}" --clobber
        shell: bash
